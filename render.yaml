services:
  - type: web
    name: raschet-zhkh
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:application --bind 0.0.0.0:$PORT --workers 2 --threads 4
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SPREADSHEET_ID
        sync: false
      - key: SERVICE_ACCOUNT_JSON
        sync: false
