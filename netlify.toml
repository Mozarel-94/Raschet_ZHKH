[build]
  publish = "web"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/api/auth-config"
  to = "/.netlify/functions/auth-config"
  status = 200

[[redirects]]
  from = "/api/month"
  to = "/.netlify/functions/month"
  status = 200

[[redirects]]
  from = "/api/calculate"
  to = "/.netlify/functions/calculate"
  status = 200

[[redirects]]
  from = "/api/history"
  to = "/.netlify/functions/history"
  status = 200

[[redirects]]
  from = "/login"
  to = "/login/index.html"
  status = 200

[[redirects]]
  from = "/reset-password"
  to = "/reset-password/index.html"
  status = 200

[[redirects]]
  from = "/history"
  to = "/history/index.html"
  status = 200
