<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Новый пароль | Расчёт коммунальных платежей</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="auth-shell">
    <section class="auth-card">
      <div class="eyebrow">Supabase Auth</div>
      <h1>Восстановление пароля</h1>
      <p class="section-note">
        Откройте эту страницу по ссылке из письма и задайте новый пароль для входа в приложение.
      </p>

      <div id="reset-message-box"></div>

      <form id="reset-password-form" class="auth-form">
        <div class="field">
          <label for="new-password">Новый пароль</label>
          <input
            id="new-password"
            name="new-password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />
        </div>

        <div class="field">
          <label for="confirm-password">Повторите пароль</label>
          <input
            id="confirm-password"
            name="confirm-password"
            type="password"
            autocomplete="new-password"
            minlength="6"
            required
          />
        </div>

        <div class="auth-actions">
          <button id="reset-password-button" class="filled-button" type="submit">
            Сохранить новый пароль
          </button>
        </div>
      </form>
    </section>
  </div>

  <script type="module" src="/reset-password/app.js"></script>
</body>
</html>
